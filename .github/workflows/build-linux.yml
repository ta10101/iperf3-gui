# Linux portable binary + Debian .deb when you push a version tag (e.g. v1.1.2).
# Download artifacts from the Actions run and attach them to your GitHub Release.
name: Build Linux binary and .deb

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk iperf3 dpkg-dev

      - name: PyInstaller (single binary)
        run: |
          python -m pip install --upgrade pip
          pip install "pyinstaller>=6.0"
          python -m PyInstaller --noconfirm --clean --windowed --name iperf3-gui --onefile iperf3_gui.py

      - name: Build .deb package
        run: |
          chmod +x build_deb.sh
          ./build_deb.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: iperf3-gui-linux-${{ github.ref_name }}
          path: |
            dist/iperf3-gui
            dist/iperf3-gui_*_amd64.deb
