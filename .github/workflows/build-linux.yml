# Produces a Linux x86_64 single binary when you push a version tag (e.g. v1.1.0).
# Download the artifact from the Actions run and attach it to your GitHub Release.
name: Build Linux binary

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Tk and iperf3 (for sanity; not bundled)
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk iperf3

      - name: PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install "pyinstaller>=6.0"
          python -m PyInstaller --noconfirm --clean --windowed --name iperf3-gui --onefile iperf3_gui.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: iperf3-gui-${{ github.ref_name }}-linux-x86_64
          path: dist/iperf3-gui
